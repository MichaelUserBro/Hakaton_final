<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль — {{ user.username }}</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-container {
            background-color: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 8px;
            padding: 40px;
            width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .user-header {
            border-bottom: 1px solid #3c3c3c;
            padding-bottom: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .avatar-circle {
            width: 60px;
            height: 60px;
            background-color: #6a9955;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            margin-right: 20px;
        }
        .username-title {
            font-size: 24px;
            color: #569cd6;
        }
        .info-row {
            margin: 15px 0;
            font-size: 16px;
        }
        .label { color: #9cdcfe; }
        .value { color: #ce9178; }
        
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 30px;
            padding: 10px;
            background-color: #37373d;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn-back:hover {
            background-color: #45454d;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="user-header">
            <div class="avatar-circle">
                {{ user.username|slice:":1"|upper }}
            </div>
            <div class="username-title">@{{ user.username }}</div>
        </div>
        
        <div class="info-row">
            <span class="label">Email:</span> 
            <span class="value">{{ user.email|default:"не указан" }}</span>
        </div>
        
        <div class="info-row">
            <span class="label">Status:</span> 
            <span class="value">Active Developer</span>
        </div>

        <div class="info-row">
            <span class="label">Joined:</span> 
            <span class="value">{{ user.date_joined|date:"M d, Y" }}</span>
        </div>

        <a href="{% url 'index' %}" class="btn-back">Return to Editor</a>
    </div>
</body>
</html>
