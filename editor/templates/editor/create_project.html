<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать комнату</title>
    <style>
        body { background-color: #1e1e1e; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-container { background: #252526; padding: 30px; border-radius: 8px; border: 1px solid #3c3c3c; width: 300px; }
        h2 { color: #6a9955; font-size: 18px; margin-bottom: 20px; text-align: center; }
        input { width: 100%; padding: 10px; margin-bottom: 20px; background: #3c3c3c; border: 1px solid #555; color: white; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background: #28a745; border: none; color: white; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #218838; }
        .back { display: block; text-align: center; margin-top: 15px; color: #569cd6; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>New room</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="project_name" placeholder="Name" required>
            <button type="submit" class="btn">Create and log in</button>
        </form>
        
        <a href="{% url 'index' %}" class="back">Back to editor</a>
    </div>
</body>
</html>
