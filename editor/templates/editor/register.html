<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — Hackathon IDE</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-container {
            background-color: #252526;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 350px;
        }
        h2 { color: #6a9955; text-align: center; margin-bottom: 20px; }
        form p { margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #3c3c3c;
            background: #3c3c3c;
            color: white;
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-submit:hover { background-color: #218838; }
        .login-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #569cd6;
            text-decoration: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Создать аккаунт</h2>
        <form method="POST">
            {% csrf_token %}
            
            {% if form.errors %}
                <div style="color: #f44336; background: #ffebee; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 0.8em;">
                    {% for field in form %}
                        {% for error in field.errors %}
                            <strong>{{ field.label }}:</strong> {{ error }}<br>
                        {% endfor %}
                    {% endfor %}
                    {% for error in form.non_field_errors %}
                        {{ error }}<br>
                    {% endfor %}
                </div>
            {% endif %}

            {{ form.as_p }}
            <button type="submit" class="btn-submit">Зарегистрироваться</button>
        </form>
        <a href="{% url 'index' %}" class="login-link">Назад к редактору</a>
    </div>
</body>
</html>
